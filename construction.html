<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project ID - Under Construction</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #ccc;
        }
        .progress-container {
            margin-top: 30px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
        .progress-bar {
            height: 20px;
            width: 90%;
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            text-align: right;
            padding-right: 10px;
            line-height: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .contact-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background-color: #ff6f61;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .contact-btn:hover {
            background-color: #ff3b2e;
        }
        .eta-date {
            margin-top: 20px;
            font-size: 1rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>🚧 Project ID: Under Construction 🚧</h1>
    <p>This project is being developed by <strong>Tarikul</strong>. Stay tuned for updates!</p>

    <div class="progress-container">
        <div class="progress-bar">90%</div>
    </div>

    <p class="eta-date">ETA: 10 Aug 25</p>

    <a class="contact-btn" href="mailto:mrtarikulislamtarek@gmail.com">Contact Me</a>
</body>
</html>
